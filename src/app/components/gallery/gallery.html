<section id="galeria" class="gallery cream-surface">
  <div class="gallery__inner container-x">
    <header class="gallery__header js-reveal">
      <span class="section-eyebrow">Galería</span>
    </header>

    <div class="gallery__grid" data-gsap-stagger>
      @for (photo of photos; track photo.title) {
      <article class="gallery__item" [class.gallery__item--wide]="photo.wide">
        @if (photo.image) {
        <img [src]="photo.image" [alt]="photo.title" loading="lazy" />
        } @else {
        <div class="photo-fallback"><span>{{ photo.title }}</span></div>
        }
      </article>
      }
    </div>

    <div class="gallery__action js-reveal">
      <a class="btn-gold" href="#contacto">Ver más fotos <span aria-hidden="true">›</span></a>
    </div>
  </div>
</section>
