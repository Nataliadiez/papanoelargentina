<section id="contacto" class="contact red-surface">
  <div class="contact__ornament js-parallax" data-speed="0.08" aria-hidden="true"></div>

  <div class="contact__inner container-x">
    <div class="contact__copy js-reveal">
      <span class="section-eyebrow">Contacto</span>
      <h2>¿Querés llevar la magia <span>a tu evento?</span></h2>
      <p>Escribinos y llevemos la verdadera magia de la Navidad a tu celebración.</p>
    </div>

    <form class="contact__form js-reveal" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="contact__row">
        <label>
          <span>Nombre y apellido</span>
          <input type="text" formControlName="nombre" autocomplete="name" [class.is-invalid]="hasError('nombre')" />
          @if (hasError('nombre')) {
            <small>Ingresá tu nombre.</small>
          }
        </label>

        <label>
          <span>Email</span>
          <input type="email" formControlName="email" autocomplete="email" [class.is-invalid]="hasError('email')" />
          @if (hasError('email')) {
            <small>Ingresá un email válido.</small>
          }
        </label>
      </div>

      <label>
        <span>Teléfono</span>
        <input type="tel" formControlName="telefono" autocomplete="tel" [class.is-invalid]="hasError('telefono')" />
        @if (hasError('telefono')) {
          <small>Ingresá un teléfono válido.</small>
        }
      </label>

      <label>
        <span>Tipo de evento</span>
        <select formControlName="tipoEvento" [class.is-invalid]="hasError('tipoEvento')">
          <option value="" disabled>Seleccioná una opción</option>
          @for (eventType of eventTypes; track eventType) {
            <option [value]="eventType">{{ eventType }}</option>
          }
        </select>
        @if (hasError('tipoEvento')) {
          <small>Seleccioná el tipo de evento.</small>
        }
      </label>

      <label>
        <span>Mensaje</span>
        <textarea rows="6" formControlName="mensaje" placeholder="Contanos tu idea..." [class.is-invalid]="hasError('mensaje')"></textarea>
        @if (hasError('mensaje')) {
          <small>El mensaje necesita al menos 10 caracteres.</small>
        }
      </label>

      <button class="btn-gold contact__submit" type="submit" [disabled]="sending()">
        @if (sending()) {
          Enviando...
        } @else {
          Enviar mensaje <span aria-hidden="true">→</span>
        }
      </button>

      @if (sent()) {
        <p class="contact__feedback contact__feedback--ok">Se abrió tu cliente de correo con el mensaje listo. ✨</p>
      }

      @if (errorMessage()) {
        <p class="contact__feedback contact__feedback--error">{{ errorMessage() }}</p>
      }
    </form>
  </div>
</section>
